about_content: | # this will include new lines to allow paragraphs
  4년차 유니티 클라이언트 개발자입니다. 3년간 주로 한 작업은 <b>UI 작업, REST API 연동 작업, Unity XR Toolkit을 활용 VR 앱 제작, TCP 소켓을 활용한 1:1 패킷 통신 구축, UDP 소켓을 통한 1:1 화면 미러링</b>이 있습니다.
  
  그 외 유니티 TV앱 제작 및 배포, 스마트 워치 핏빛 유니티 연동, 핏빗 시계 앱 제작, 안드로이드 네이티브 앱 제작 등이 있습니다.
  
  소규모 팀과 잘 짜여진 팀 구성으로 한 <mark>프로젝트의 처음과 끝</mark>을 마무리 지은 경험이 있습니다.
  
  개발에 있어서 상황이 적절하다면 <mark>새로운 것을 도입하고 배우는 것</mark>에 거부감이 없습니다.
  
  2023년에는 게임 서버 쪽과 백엔드 쪽을 공부하고 있고, 이를 유니티 사이드 프로젝트에 적용해 <mark>더 많은 경험을 쌓는 것</mark>을 목표합니다.  

