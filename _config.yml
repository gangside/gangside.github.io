about_content: | # this will include new lines to allow paragraphs
  4년 차 유니티 클라이언트 개발자입니다. 유니티에서 주로 한 작업을 요약하면 <mark>UI 중심의 앱 제작</mark>과 <mark>솔루션 중심의 VR 앱 제작</mark>과 솔루션을 위해 해당 도메인의 <mark>레거시 알고리즘 분석 후 프로그램 구현</mark>이 있습니다. 
  
  잘 짜인 팀 구성으로 한 <mark>프로젝트의 처음과 끝</mark>을 담당하면서 그 과정에서 디자이너, 기획자 등과 소통하며 마무리 지은 경험이 있습니다.
  
  개발에 있어서 상황에 적절하다면 <mark>새로운 것을 도입하고 배우는 것</mark>에 거부감이 없습니다.
  
  2023년에는 게임 서버 쪽과 백엔드 쪽을 공부하고 있고 앞으로 <mark>다양한 상황에 대처 할 수 있는 능력</mark>을 기르고 있습니다.  

content:
  - title: 상세 기술 경험
    layout: list # Type of content section (list/text)
    content:
      - layout: left
        title: Unity
        description: | # this will include new lines to allow paragraphs
          - GUI 디자인 패턴인 MVP 스타일의 UI 프레임워크 두 종류 사용 경험
          - Unity XR Toolkit을 이용한 VR앱 제작 경험 (연동 경험이 있는 VR HMD 종류: FOV, PICO, OCULUS, VIVE)
          - 눈 추적 센서 데이터 처리 경험 (Pico 사의 Tobii SDK)
          - UDP, TCP 소켓을 활용한 단방향 화면 미러링 구현과 미러링 시 네트워크 지연에 대한 대응 경험
          - TCP 소켓을 활용한 1:1 패킷 통신 구축과 패킷 생성 자동화 구축 경험
          - Jenkins를 활용한 Android, Windows 타겟의 빌드 자동화 구축 경험 (Windows 기반 Jenkins)
          - C#의 File Input, Output 인터페이스에 대한 사용에 대한 경험
          - 기획자와 잦은 작업 소통 경험
          - 디자이너와 프리펩 단위의 UI 작업 소통 경험
          - 최소한 AdobeXD 파일만으로도 깔끔하게 Unity UI로 그려낼 수 있는 작업 능력 보유
          - REST API 구현 (Unity 코드 말고도 에셋 RestClient, BestHTTP 연동 경험) (비동기 처리 포함)
          - XML, Json 등에 대한 데이터 처리에 대한 경험
          - UNITY TV App 빌드 및 출시에 대한 경험
          - 다국어 지원 경험 - [I2Localization](https://assetstore.unity.com/packages/tools/localization/i2-localization-14884) 활용
          - 180도 입체 영상 및 360도 영상 플레이 구현 경험 - [AVPro](https://assetstore.unity.com/packages/tools/video/avpro-video-ultra-edition-184294) 활용 
          - MV(R)P 패턴의 UI 관리 구현 시도 경험 - [UniRx](https://assetstore.unity.com/packages/tools/integration/unirx-reactive-extensions-for-unity-17276) 활용
          - UI Animation 적용 경험 - [DOTween](https://assetstore.unity.com/packages/tools/visual-scripting/dotween-pro-32416) 활용 
          - SQLite 구현 경험 - [SimpleSQL](https://assetstore.unity.com/packages/tools/integration/simplesql-3845) 활용
          - <mark>결론</mark>: <b>0부터 구현하게 되는 기능 구현의 경험보다는 특정 라이브러리나 프레임워크를 활용한 전체 프로젝트 단위의 기능 구현의 경험이 더 많으며 이를 바탕으로 빠르고 신속하게 프로젝트를 구현했던 경험이 더 많습니다.</b>
      - layout: left
        title: 코드 스타일
        description: | # this will include new lines to allow paragraphs     
          - 협업 시 네이밍만으로 클래스나 메서드의 역할을 전달하기 어렵다고 보일 경우 가능한 주석 첨부
          - 일정이 허락하는 한 처음 짤 때 깔끔하게 짜는 편으로 공수가 들더라도 대충 짜고 넘어갔을 때 발생이 예상되는 문제와 시간 소요를 계산해서 양자택일하여 판단하는 편
          - 코딩하고 테스트 필수적으로 진행
          - 중복되는 코드는 지양하며 이에 적합한 디자인 패턴이 있을 거라 예상되면 찾아봐서 정리하거나 따로 기능 집합의 클래스로 빼는 식으로 정리하는 편
          - 클래스와 메서드에 각각 하나의 책임만 두는 원칙을 지키려고 함
          - 기능 뭉치에서 노출되는 인터페이스는 가능한 최소화 하려고 함
          - 코딩을 급하게 하게 되는 경우 예상되는 문제는 모두 리스트업 하여 여유있을 떄 우선순위대로 쳐냄
          - <mark>결론</mark>: <b>최소한 다른 사람이 코드를 알아볼 수 있어야 한다고 생각하고, 코드 가독성을 최우선 순위로 두고 있습니다.</b>
      - layout: left
        title: 협업 스타일
        description: | # this will include new lines to allow paragraphs     
          - 형상관리 툴로 프로젝트 관리 시, 가능한 올라오는 코드를 대략 파악하여 협업에 문제 없도록 함
          - 해당 팀이나 협업하는 인원에 최대한 스타일을 맞춰가는 편
          - 좋은 정보가 있다면 공유하여 동료와 제가 같이 성장할 수 있는 것을 지향함
          - <mark>결론</mark>: <b>코드 리뷰나 협업에 관한 개발 문화에 대한 경험이 없어, 이러한 문화를 만들거나 배우고 싶은 욕심이 있습니다. 같이 일하는 분들과 갈등 없이 맞춰나가야 한다고 생각합니다.</b>
      - layout: left
        title: 프로젝트 관리
        description: | # this will include new lines to allow paragraphs     
          - SVN
          - Git
          - Redmine
          - Jenkins
      - layout: left
        title: ETC
        description: | # this will include new lines to allow paragraphs     
          - Android Native App 제작 경험 (MVVM 가이드에 따라 적용, REST API 적용, 커스텀 Video Player 구현, 언어는 Java)
          - 스마트 워치인 Fitbit App 제작 경험 (Fitbit에서 제공하는 신체 심박수와 같은 센서 데이터를 회사 서버로 추출하는 프로그램)
